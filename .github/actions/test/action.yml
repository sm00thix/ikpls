name: Test
description: Test the package

inputs:
  PYTHON_VERSION:
    description: Test Python version
    required: true
  INSTALL_JAX:
    description: Whether to install JAX extras (true/false)
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ inputs.PYTHON_VERSION }}

    - name: Install project dependencies (with JAX)
      if: ${{ inputs.INSTALL_JAX == 'true' }}
      run: uv sync --extra jax --group dev
      shell: bash

    - name: Install project dependencies (without JAX)
      if: ${{ inputs.INSTALL_JAX != 'true' }}
      run: uv sync --group dev
      shell: bash

    - name: Run full tests (with JAX)
      if: ${{ inputs.INSTALL_JAX == 'true' }}
      run: |
        uv run pytest tests --ignore=tests/test_numpy_only.py --typeguard-packages=ikpls --cov=ikpls --cov-report=xml
      shell: bash

    - name: Run numpy-only tests (without JAX)
      if: ${{ inputs.INSTALL_JAX != 'true' }}
      run: |
        uv run pytest tests/test_numpy_only.py -v --cov=ikpls --cov-report=xml
      shell: bash

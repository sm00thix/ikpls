name: Build
description: Build the package

runs:
   using: "composite"
   steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.14'

    - name: Lint with ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uvx ruff check ikpls/ --select=E9,F63,F7,F82 --output-format=full
        # exit-zero treats all findings (line length + complexity) as warnings
        uvx ruff check ikpls/ --select=E501,C901 --line-length=88 --exit-zero --statistics
      shell: bash

    - name: Build a binary wheel and a source tarball
      run: uv build
      shell: bash

    - name: Check the distribution with twine
      run: uvx twine check dist/*
      shell: bash

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

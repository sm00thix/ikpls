name: Tests

on:
    push:
        branches: [ "main" ]
        paths:
            - 'ikpls/**'
            - 'tests/**'
            - '.github/**'
            - 'pyproject.toml'
            - 'uv.lock'

jobs:
    # Full test suite with JAX installed
    test_package_with_jax:
        runs-on: ${{ matrix.os }}
        strategy:  
            fail-fast: false  
            matrix:  
                os: [ubuntu-latest, windows-latest, macos-latest]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/test
              with:
                PYTHON_VERSION: ${{ matrix.python-version }}
                INSTALL_JAX: 'true'
            
            - name: Upload coverage to Coveralls
              uses: coverallsapp/github-action@v2
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                path-to-lcov: coverage.xml
                flag-name: ${{ matrix.os }}-python-${{ matrix.python-version }}-jax
                parallel: true
                # A Coveralls outage must not fail the build.
                fail-on-error: false

    # Test numpy-only installation (without JAX)
    test_package_numpy_only:
        runs-on: ${{ matrix.os }}
        strategy:  
            fail-fast: false  
            matrix:  
                os: [ubuntu-latest, windows-latest, macos-latest]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        steps:
            - uses: actions/checkout@v4
            - uses: ./.github/actions/test
              with:
                PYTHON_VERSION: ${{ matrix.python-version }}
                INSTALL_JAX: 'false'
            
            - name: Upload coverage to Coveralls
              uses: coverallsapp/github-action@v2
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                path-to-lcov: coverage.xml
                flag-name: ${{ matrix.os }}-python-${{ matrix.python-version }}-numpy-only
                parallel: true
                # A Coveralls outage must not fail the build.
                fail-on-error: false

    finish:
        needs: [test_package_with_jax, test_package_numpy_only]
        runs-on: ubuntu-latest
        steps:
            - name: Finish Coveralls
              uses: coverallsapp/github-action@v2
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                parallel-finished: true
                # A Coveralls outage must not fail the build.
                fail-on-error: false